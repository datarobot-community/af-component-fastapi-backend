---
!include "libraries/af-library-common/copier.yml"
---

# questions
fastapi_app_name:
  type: str
  default: "web"
  help: "The name/folder of your FastAPI Web App. Required to use a python friendly name like web or api_backend"

fastapi_local_port:
  type: int
  default: "8080"
  help: "The port to run this FastAPI Web App"

subcomponents:
  type: str
  multiselect: True
  choices:
  - af-component-fastapi-backend-oauth
  - af-component-fastapi-backend-persistence-sqlite  
  # Oauth needs persistence, but we don't have a way to exprress this yet
  default: '[af-component-fastapi-backend-oauth, af-component-fastapi-backend-persistence-sqlite]'

base_answers_file:
  type: str
  default: ".datarobot/answers/base.yml"
  help: "Path to the base component answers file"

# Grab the base component answers to re-use answers
_external_data:
  base: "{{ base_answers_file }}"

_subdirectory: template
_answers_file: ".datarobot/answers/fastapi-{{ fastapi_app_name }}.yml"
_preserve_symlinks: true
