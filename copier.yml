# questions
fastapi_app_name:
  type: str
  default: "web"
  help: "The name/folder of your FastAPI Web App. Required to use a python friendly name like web or api_backend"

fastapi_local_port:
  type: int
  default: "8080"
  help: "The port to run this FastAPI Web App"

copyright_year:
  type: int
  default: 2025
  help: "The current year to register copyright properly in the license file"

base_answers_file:
  type: str
  default: ".datarobot/answers/base.yml"
  help: "Path to the base component answers file"

api_key_scope_level:
  type: str
  default: ""
  help: "API key scope configuration. When disabled (empty), only the creator API key is available with full scope. When enabled, both user and creator API keys become available, but are limited to the specified scope. Options are 'viewer', 'user', or 'admin'."
  validator: "{% if api_key_scope_level not in ['', 'viewer', 'user', 'admin'] %}Must be one of '', 'viewer', 'user', or 'admin'{% endif %}"

# Grab the base component answers to re-use answers
_external_data:
  base: "{{ base_answers_file }}"

_subdirectory: template
_answers_file: ".datarobot/answers/fastapi-{{ fastapi_app_name }}.yml"
_preserve_symlinks: true
